name: Deploy to Pages Branch

on:
  # 每次推送到 `master` 分支时触发这个"工作流程"
  push:
    branches: [ master ]
  # 允许你在 GitHub 上的 Actions 标签中手动触发此"工作流程"
  workflow_dispatch:

# 需要写入权限来推送到pages分支
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史以便正确处理版本
          submodules: false  # 禁用子模块，项目不需要
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
          
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      
      - name: Build site
        run: pnpm run build
        env:
          NODE_ENV: production
      
      - name: Debug build output
        run: |
          echo "=== Build output structure ==="
          ls -la dist/
          echo "=== Checking for assets ==="
          ls -la dist/_astro/ 2>/dev/null || echo "No _astro folder"
          echo "=== Checking HTML head ==="
          head -50 dist/index.html | grep -E '(href|src)=' || echo "No index.html or no links found"
      
      - name: Deploy to pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: pages # 部署到pages分支
          folder: dist # Astro默认构建输出目录
          clean: true # 清理目标分支中的旧文件
          single-commit: true # 单提交模式，减少分支历史